# Server Configuration
server:
  port: 8081

# Spring Configuration
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format-sql: true
    show-sql: true

